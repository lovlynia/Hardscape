<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Phoenix Stoneworks</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

     <header class="aboutus">
        <nav>
            <ul class="sidebar">
                <li onclick=hideSidebar()><a href="#">✖</a></li>
                <li><a href="gallery.html">Our Work</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <ul>
                <li><a href="index.html">Phoenix Stoneworks LLC</a></li>
                <li class="hideOnMobile"><a href="gallery.html">Our Work</a></li>
                <li class="hideOnMobile"><a href="about.html">About</a></li>
                <li class="hideOnMobile"><a href="contact.html">Contact</a></li>
                <li class="menu-button" onclick=showSidebar()><a href="#">☰</a></li>
                
            </ul>
        </nav>
    </header>

    <section class="gallery-section">
    <div class="gallery-title">
        <h1>Our Work</h1>
    </div>
 
    <div class="gallery-grid" id="galleryGrid">
        
    </div>
</section>

    <div class="lightbox" id="lightbox">
    <div class="lightbox-inner">
        <div class="lightbox-top">
            <button class="lightbox-close" onclick="closeLightbox()">✕</button>
        </div>
        <div class="carousel">
            <div class="carousel-track" id="carouselTrack"></div>
            <button class="carousel-btn prev" onclick="moveCarousel(-1)">&#8592;</button>
            <button class="carousel-btn next" onclick="moveCarousel(1)">&#8594;</button>
        </div>
        <div class="slide-counter" id="slideCounter"></div>
        <div class="carousel-dots" id="carouselDots"></div>
    </div>
</div>



    <footer>
        <a href="index.html">Home</a>
        <a href="mailto:youremail@gmail.com">Contact Us</a>
        <a href="about.html">About</a>
    </footer>

 <script>
        function showSidebar(){
            const sidebar=document.querySelector('.sidebar');
            sidebar.style.display='flex';
        }
        function hideSidebar(){
            const sidebar=document.querySelector('.sidebar');
            sidebar.style.display='none';
        }
    </script>

    <script src="gallery.js"></script>


</body>
</html>
